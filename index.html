<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TipTop - Refactor Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            touch-action: none;
            background-color: #121212;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #game-canvas { display: block; }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes fade-up {
            0% { opacity: 0; transform: translateY(20px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
        .bonus-anim {
            animation: fade-up 1.5s ease-out forwards;
        }
    </style>
</head>
<body>

    <!-- UI Overlay -->
    <div id="ui" class="fixed inset-0 pointer-events-none flex flex-col justify-between p-6 z-10">
        <div class="flex justify-between items-start pointer-events-auto">
            <div class="glass text-white px-5 py-3 rounded-2xl">
                <p class="text-[10px] uppercase tracking-widest opacity-50 font-bold">Pontszám</p>
                <p id="score-display" class="text-3xl font-black">0</p>
            </div>
            
            <!-- Bonus Notification Area -->
            <div id="bonus-container" class="flex-1 flex justify-center pt-2">
                <!-- Dinamikusan ide kerülnek a bónusz üzenetek -->
            </div>

            <div id="timer-card" class="glass text-white px-5 py-3 rounded-2xl text-right transition-all">
                <p class="text-[10px] uppercase tracking-widest opacity-50 font-bold">Idő</p>
                <p id="timer-display" class="text-3xl font-black tabular-nums">90.0s</p>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="absolute inset-0 flex items-center justify-center pointer-events-auto bg-black/60 transition-opacity duration-500">
            <div class="glass p-10 rounded-[2rem] text-center max-w-sm mx-4 shadow-2xl">
                <h1 class="text-5xl font-extrabold text-white mb-6 tracking-tighter">TipTop</h1>
                <p class="text-gray-400 mb-8 leading-relaxed">
                    Egyensúlyozz a golyóval a zöld célpontig! <br>
                    <span class="text-blue-400 font-medium">Döntsd a telefonod az irányításhoz.</span>
                </p>
                <button id="start-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-900/40 transition-transform active:scale-95">
                    JÁTÉK INDÍTÁSA
                </button>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="hidden absolute inset-0 flex items-center justify-center pointer-events-auto bg-black/90">
            <div class="glass p-12 rounded-[2.5rem] text-center max-w-sm mx-4 border-red-500/20">
                <h2 class="text-2xl font-bold text-red-500 mb-2 uppercase tracking-widest">Idő lejárt</h2>
                <div class="text-8xl font-black text-white mb-10" id="final-score">0</div>
                <button id="restart-btn" class="w-full bg-white text-black font-black py-5 rounded-2xl hover:bg-gray-200 transition-all">
                    ÚJRAPRÓBÁLOM
                </button>
            </div>
        </div>

        <!-- Penalty Countdown -->
        <div id="penalty-layer" class="hidden absolute inset-0 flex items-center justify-center pointer-events-none bg-red-500/10">
            <div class="text-center">
                <p class="text-red-500 font-black tracking-widest uppercase mb-2">Újraindulás...</p>
                <p id="penalty-timer" class="text-white text-8xl font-black">3</p>
            </div>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script>
        /**
         * CONFIGURATION
         */
        const CONFIG = {
            GAME_DURATION: 90,
            PHYSICS: {
                FRICTION: 0.97,
                ACCEL_BASE: 0.08,
                ACCEL_INC: 0.005,
                BOUNCE: -0.5
            },
            ENTITIES: {
                BALL_RADIUS: 12,
                HOLE_RADIUS: 18,
                GOAL_RADIUS: 25,
                POWERUP_RADIUS: 20 // Slightly larger to fit text
            },
            COLORS: {
                BALL: '#ffffff',
                HOLE: '#000000',
                GOAL: '#22c55e',
                POWERUP: '#fbbf24',
                BG: '#121212'
            }
        };

        /**
         * ENTITY CLASSES
         */
        class Ball {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = 60;
                this.y = 60;
                this.vx = 0;
                this.vy = 0;
                this.radius = CONFIG.ENTITIES.BALL_RADIUS;
            }
            update(tilt, score) {
                const accel = CONFIG.PHYSICS.ACCEL_BASE + (Math.min(10, score) * CONFIG.PHYSICS.ACCEL_INC);
                this.vx += tilt.gamma * accel;
                this.vy += tilt.beta * accel;
                this.vx *= CONFIG.PHYSICS.FRICTION;
                this.vy *= CONFIG.PHYSICS.FRICTION;
                this.x += this.vx;
                this.y += this.vy;
                this.handleBounds();
            }
            handleBounds() {
                if (this.x < this.radius || this.x > window.innerWidth - this.radius) {
                    this.vx *= CONFIG.PHYSICS.BOUNCE;
                    this.x = this.x < this.radius ? this.radius : window.innerWidth - this.radius;
                }
                if (this.y < this.radius || this.y > window.innerHeight - this.radius) {
                    this.vy *= CONFIG.PHYSICS.BOUNCE;
                    this.y = this.y < this.radius ? this.radius : window.innerHeight - this.radius;
                }
            }
            draw(ctx, isWaiting) {
                if (isWaiting && Math.floor(Date.now() / 200) % 2 === 0) return;
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = "white";
                ctx.fillStyle = CONFIG.COLORS.BALL;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Hole {
            constructor(w, h, ballPos, goalPos, score) {
                this.radius = CONFIG.ENTITIES.HOLE_RADIUS;
                this.scoreAtSpawn = score;
                this.generateValidPos(w, h, ballPos, goalPos);
                
                this.isMoving = score > 5;
                if (this.isMoving) {
                    const speed = Math.random() * 2 + 1;
                    const angle = Math.random() * Math.PI * 2;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.range = 50 + Math.random() * 100;
                    this.baseX = this.x;
                    this.baseY = this.y;
                }
            }
            generateValidPos(w, h, ballPos, goalPos) {
                let attempts = 0;
                do {
                    this.x = Math.random() * (w - 60) + 30;
                    this.y = Math.random() * (h - 60) + 30;
                    attempts++;
                } while (
                    attempts < 100 && (
                        Math.hypot(this.x - ballPos.x, this.y - ballPos.y) < 110 ||
                        Math.hypot(this.x - goalPos.x, this.y - goalPos.y) < 90
                    )
                );
            }
            update() {
                if (!this.isMoving) return;
                this.x += this.vx;
                this.y += this.vy;
                if (Math.abs(this.x - this.baseX) > this.range || this.x < 20 || this.x > window.innerWidth - 20) this.vx *= -1;
                if (Math.abs(this.y - this.baseY) > this.range || this.y < 20 || this.y > window.innerHeight - 20) this.vy *= -1;
            }
            draw(ctx) {
                ctx.fillStyle = CONFIG.COLORS.HOLE;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                if (this.isMoving) {
                    ctx.strokeStyle = "rgba(59, 130, 246, 0.4)";
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
        }

        /**
         * GAME ENGINE
         */
        const Game = {
            state: {
                active: false,
                gameOver: false,
                waiting: false,
                score: 0,
                timeLeft: CONFIG.GAME_DURATION,
                tilt: { beta: 0, gamma: 0 }
            },
            entities: {
                ball: new Ball(),
                holes: [],
                goal: { x: 0, y: 0 },
                powerup: null
            },
            
            init() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                document.getElementById('start-btn').onclick = () => this.requestAuth();
                document.getElementById('restart-btn').onclick = () => this.reset();
                
                this.loop();
            },

            async requestAuth() {
                if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    const res = await DeviceOrientationEvent.requestPermission();
                    if (res !== 'granted') return;
                }
                this.start();
            },

            start() {
                document.getElementById('start-screen').classList.add('opacity-0');
                setTimeout(() => document.getElementById('start-screen').classList.add('hidden'), 500);
                this.state.active = true;
                window.addEventListener('deviceorientation', e => {
                    this.state.tilt.beta = e.beta || 0;
                    this.state.tilt.gamma = e.gamma || 0;
                }, true);
                this.generateLevel();
            },

            reset() {
                this.state.score = 0;
                this.state.timeLeft = CONFIG.GAME_DURATION;
                this.state.gameOver = false;
                this.state.waiting = false;
                document.getElementById('score-display').innerText = "0";
                document.getElementById('game-over-screen').classList.add('hidden');
                this.generateLevel();
            },

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            },

            generateLevel() {
                const w = this.canvas.width, h = this.canvas.height;
                this.entities.ball.reset();
                
                // Goal
                do {
                    this.entities.goal.x = Math.random() * (w - 160) + 80;
                    this.entities.goal.y = Math.random() * (h - 160) + 80;
                } while (Math.hypot(this.entities.goal.x - this.entities.ball.x, this.entities.goal.y - this.entities.ball.y) < w * 0.4);

                // Powerup (+5s indicator)
                this.entities.powerup = (Math.random() < 0.35) ? {
                    x: Math.random() * (w - 160) + 80,
                    y: Math.random() * (h - 160) + 80,
                    active: true
                } : null;

                // Holes
                this.entities.holes = [];
                const count = 3 + Math.floor(this.state.score / 2);
                for(let i=0; i<count; i++) {
                    this.entities.holes.push(new Hole(w, h, this.entities.ball, this.entities.goal, this.state.score));
                }
            },

            triggerPenalty() {
                if (this.state.waiting || this.state.gameOver) return;
                this.state.waiting = true;
                const layer = document.getElementById('penalty-layer');
                const timer = document.getElementById('penalty-timer');
                layer.classList.remove('hidden');
                
                let count = 3;
                timer.innerText = count;
                const itv = setInterval(() => {
                    count--;
                    if (count > 0) timer.innerText = count;
                    else {
                        clearInterval(itv);
                        layer.classList.add('hidden');
                        this.state.waiting = false;
                        this.entities.ball.reset();
                    }
                }, 1000);
            },

            showBonusToast() {
                const container = document.getElementById('bonus-container');
                const toast = document.createElement('div');
                toast.className = 'glass px-4 py-1 rounded-full text-yellow-400 font-bold text-sm bonus-anim flex items-center shadow-lg border-yellow-500/30';
                toast.innerHTML = `<span class="mr-1">⚡</span> IDŐ BÓNUSZ +5s`;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 1600);
            },

            update(dt) {
                if (!this.state.active || this.state.gameOver) return;

                // Timer runs even during penalty
                this.state.timeLeft -= dt / 1000;
                if (this.state.timeLeft <= 0) {
                    this.state.timeLeft = 0;
                    this.state.gameOver = true;
                    document.getElementById('final-score').innerText = this.state.score;
                    document.getElementById('game-over-screen').classList.remove('hidden');
                    return;
                }

                document.getElementById('timer-display').innerText = this.state.timeLeft.toFixed(1) + 's';
                if (this.state.timeLeft < 10) document.getElementById('timer-card').classList.add('bg-red-600/40');
                else document.getElementById('timer-card').classList.remove('bg-red-600/40');

                if (this.state.waiting) return;

                // Entities update
                this.entities.ball.update(this.state.tilt, this.state.score);
                this.entities.holes.forEach(h => h.update());

                // Collisions: Goal
                if (Math.hypot(this.entities.ball.x - this.entities.goal.x, this.entities.ball.y - this.entities.goal.y) < CONFIG.ENTITIES.GOAL_RADIUS) {
                    this.state.score++;
                    document.getElementById('score-display').innerText = this.state.score;
                    this.generateLevel();
                }

                // Collisions: Holes
                for (let h of this.entities.holes) {
                    if (Math.hypot(this.entities.ball.x - h.x, this.entities.ball.y - h.y) < CONFIG.ENTITIES.HOLE_RADIUS - 2) {
                        this.triggerPenalty();
                        break;
                    }
                }
                
                // Collisions: Powerup (+5s)
                const p = this.entities.powerup;
                if (p && p.active && Math.hypot(this.entities.ball.x - p.x, this.entities.ball.y - p.y) < CONFIG.ENTITIES.POWERUP_RADIUS + 10) {
                    p.active = false;
                    this.state.timeLeft += 5;
                    this.showBonusToast();
                }
            },

            draw() {
                this.ctx.fillStyle = CONFIG.COLORS.BG;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                if (!this.state.active) return;

                // Goal
                this.ctx.fillStyle = CONFIG.COLORS.GOAL;
                this.ctx.beginPath();
                this.ctx.arc(this.entities.goal.x, this.entities.goal.y, CONFIG.ENTITIES.GOAL_RADIUS, 0, Math.PI * 2);
                this.ctx.fill();

                // Powerup (+5s label icon)
                if (this.entities.powerup?.active) {
                    const p = this.entities.powerup;
                    this.ctx.save();
                    
                    // Glow effect
                    this.ctx.shadowBlur = 15;
                    this.ctx.shadowColor = CONFIG.COLORS.POWERUP;
                    
                    // Circular background
                    this.ctx.fillStyle = CONFIG.COLORS.POWERUP;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, CONFIG.ENTITIES.POWERUP_RADIUS, 0, Math.PI * 2);
                    this.ctx.fill();
                    
                    // Text label inside
                    this.ctx.shadowBlur = 0;
                    this.ctx.fillStyle = '#000000';
                    this.ctx.font = 'bold 14px sans-serif';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    this.ctx.fillText('+5s', p.x, p.y);
                    
                    this.ctx.restore();
                }

                // Holes
                this.entities.holes.forEach(h => h.draw(this.ctx));

                // Ball
                this.entities.ball.draw(this.ctx, this.state.waiting);
            },

            loop(t) {
                const dt = t - (this.lastTime || t);
                this.lastTime = t;
                this.update(dt);
                this.draw();
                requestAnimationFrame(t => this.loop(t));
            }
        };

        window.onload = () => Game.init();
    </script>
</body>
</html>
