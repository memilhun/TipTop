<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TipTop - Refactor Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            touch-action: none;
            background-color: #121212;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        #game-canvas { display: block; }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes fade-up {
            0% { opacity: 0; transform: translateY(20px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }
        .bonus-anim {
            animation: fade-up 1.5s ease-out forwards;
        }
    </style>
</head>
<body>

    <div id="ui" class="fixed inset-0 pointer-events-none flex flex-col justify-between p-6 z-10">
        <div class="flex justify-between items-start pointer-events-auto">
            <div class="glass text-white px-5 py-3 rounded-2xl">
                <p class="text-[10px] uppercase tracking-widest opacity-50 font-bold">Pontszám</p>
                <p id="score-display" class="text-3xl font-black">0</p>
            </div>
            <div class="glass text-white px-5 py-3 rounded-2xl">
                <p class="text-[10px] uppercase tracking-widest opacity-50 font-bold">Szint</p>
                <p id="level-display" class="text-3xl font-black">1</p>
            </div>
            <div id="bonus-container" class="flex-1 flex justify-center pt-2"></div>

            <div id="timer-card" class="glass text-white px-5 py-3 rounded-2xl text-right transition-all">
                <p class="text-[10px] uppercase tracking-widest opacity-50 font-bold">Idő</p>
                <p id="timer-display" class="text-3xl font-black tabular-nums">90.0s</p>
            </div>
        </div>

        <div id="start-screen" class="absolute inset-0 flex items-center justify-center pointer-events-auto bg-black/60 transition-opacity duration-500">
            <div class="glass p-10 rounded-[2rem] text-center max-w-sm mx-4 shadow-2xl">
                <h1 class="text-5xl font-extrabold text-white mb-6 tracking-tighter">TipTop</h1>
                <p class="text-gray-400 mb-8 leading-relaxed">
                    Egyensúlyozz a golyóval a zöld célpontig! <br>
                    <span class="text-blue-400 font-medium">Döntsd a telefonod az irányításhoz.</span>
                </p>
                <button id="start-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-900/40 transition-transform active:scale-95">
                    JÁTÉK INDÍTÁSA
                </button>
            </div>
        </div>

        <div id="game-over-screen" class="hidden absolute inset-0 flex items-center justify-center pointer-events-auto bg-black/90">
            <div class="glass p-12 rounded-[2.5rem] text-center max-w-sm mx-4 border-red-500/20">
                <h2 class="text-2xl font-bold text-red-500 mb-2 uppercase tracking-widest">Idő lejárt</h2>
                <div class="text-8xl font-black text-white mb-10" id="final-score">0</div>
                <button id="restart-btn" class="w-full bg-white text-black font-black py-5 rounded-2xl hover:bg-gray-200 transition-all">
                    ÚJRAPRÓBÁLOM
                </button>
            </div>
        </div>

        <div id="level-complete-screen" class="hidden absolute inset-0 flex items-center justify-center pointer-events-auto bg-black/90">
            <div class="glass p-12 rounded-[2.5rem] text-center max-w-sm mx-4">
                <h2 class="text-2xl font-bold text-green-500 mb-4 uppercase tracking-widest">Szint teljesítve!</h2>
                
                <div id="stars-display" class="flex justify-center gap-3 mb-6">
                    <span class="text-5xl opacity-30 transition-all duration-300">⭐</span>
                    <span class="text-5xl opacity-30 transition-all duration-300">⭐</span>
                    <span class="text-5xl opacity-30 transition-all duration-300">⭐</span>
                </div>
                
                <div class="mb-6">
                    <p class="text-gray-400 text-sm mb-1">Pontszám</p>
                    <p id="level-score-display" class="text-5xl font-black text-white">0</p>
                </div>
                
                <div class="flex gap-3">
                    <button id="replay-level-btn" class="flex-1 bg-gray-700 text-white font-bold py-4 rounded-xl hover:bg-gray-600 transition-all">
                        🔄 Újra
                    </button>
                    <button id="next-level-btn" class="flex-1 bg-green-600 text-white font-bold py-4 rounded-xl hover:bg-green-500 transition-all">
                        Következő ➜
                    </button>
                </div>
            </div>
        </div>

        <div id="penalty-layer" class="hidden absolute inset-0 flex items-center justify-center pointer-events-none bg-red-500/10">
            <div class="text-center">
                <p class="text-red-500 font-black tracking-widest uppercase mb-2">Újraindulás...</p>
                <p id="penalty-timer" class="text-white text-8xl font-black">3</p>
            </div>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script>
    // ÚJ: Wake Lock változó a globális térben
        let wakeLock = null;

        // ÚJ: Wake Lock kérése függvény
        const requestWakeLock = async () => {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock aktív: A képernyő nem fog elaludni.');
                    
                    // Ha a tab fókuszát veszti (pl. váltás), újra kell kérni, ha visszajön
                    wakeLock.addEventListener('release', () => {
                        console.log('Wake Lock kioldva.');
                    });
                }
            } catch (err) {
                console.error(`${err.name}, ${err.message}`);
            }
        };

        const CONFIG = {
            GAME_DURATION: 90,
            PHYSICS: {
                FRICTION: 0.97,
                ACCEL_BASE: 0.08,
                ACCEL_INC: 0.005,
                BOUNCE: -0.5
            },
            ENTITIES: {
                BALL_RADIUS: 12,
                HOLE_RADIUS: 18,
                GOAL_RADIUS: 25,
                POWERUP_RADIUS: 20
            },
            COLORS: {
                BALL: '#ffffff',
                HOLE: '#f55742',
                GOAL: '#22c55e',
                POWERUP: '#fbbf24',
                BG: '#121212'
            }
        };

        const LEVELS = {
            1: { name: "Bemelegítés", difficulty: "easy", holes: 2, holeSpeed: 0, goalDistance: 0.3, powerupChance: 0.5, timeLimit: 30, starsThreshold: [5, 8, 12] },
            2: { name: "Gyorsulás", difficulty: "easy", holes: 3, holeSpeed: 0, goalDistance: 0.4, powerupChance: 0.4, timeLimit: 35, starsThreshold: [6, 10, 14] },
            3: { name: "Első kihívás", difficulty: "medium", holes: 3, holeSpeed: 0.5, goalDistance: 0.45, powerupChance: 0.35, timeLimit: 40, starsThreshold: [8, 12, 16] },
            4: { name: "Labirintus", difficulty: "medium", holes: 4, holeSpeed: 0.8, goalDistance: 0.5, powerupChance: 0.3, timeLimit: 45, starsThreshold: [10, 15, 20] },
            5: { name: "Végtelen káosz", difficulty: "hard", holes: 5, holeSpeed: 1.5, goalDistance: 0.6, powerupChance: 0.25, timeLimit: 60, starsThreshold: [12, 18, 25] }
        };

        const getTotalLevels = () => Object.keys(LEVELS).length;
        const getNextLevel = (currentLevel) => {
            const next = currentLevel + 1;
            return next <= getTotalLevels() ? next : null;
        };

        class Ball {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = 60;
                this.y = 60;
                this.vx = 0;
                this.vy = 0;
                this.radius = CONFIG.ENTITIES.BALL_RADIUS;
            }
            update(tilt, currentLevel) {
                const accel = CONFIG.PHYSICS.ACCEL_BASE + (Math.min(5, currentLevel) * CONFIG.PHYSICS.ACCEL_INC);
                this.vx += (tilt.gamma || 0) * accel;
                this.vy += (tilt.beta || 0) * accel;
                this.vx *= CONFIG.PHYSICS.FRICTION;
                this.vy *= CONFIG.PHYSICS.FRICTION;
                this.x += this.vx;
                this.y += this.vy;
                this.handleBounds();
            }
            handleBounds() {
                if (this.x < this.radius) {
                    this.vx *= CONFIG.PHYSICS.BOUNCE;
                    this.x = this.radius;
                } else if (this.x > window.innerWidth - this.radius) {
                    this.vx *= CONFIG.PHYSICS.BOUNCE;
                    this.x = window.innerWidth - this.radius;
                }
                if (this.y < this.radius) {
                    this.vy *= CONFIG.PHYSICS.BOUNCE;
                    this.y = this.radius;
                } else if (this.y > window.innerHeight - this.radius) {
                    this.vy *= CONFIG.PHYSICS.BOUNCE;
                    this.y = window.innerHeight - this.radius;
                }
            }
            draw(ctx, isWaiting) {
                if (isWaiting && Math.floor(Date.now() / 200) % 2 === 0) return;
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = "white";
                ctx.fillStyle = CONFIG.COLORS.BALL;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Hole {
            constructor(w, h, ballPos, goalPos) {
                this.radius = CONFIG.ENTITIES.HOLE_RADIUS;
                this.isMoving = false;
                this.vx = 0;
                this.vy = 0;
                this.range = 0;
                this.baseX = 0;
                this.baseY = 0;
                this.generateValidPos(w, h, ballPos, goalPos);
            }
            generateValidPos(w, h, ballPos, goalPos) {
                let attempts = 0;
                const safeDistBall = 110; 
                const safeDistGoal = 90;
                const margin = 40; 

                do {
                    this.x = Math.random() * (w - margin * 2) + margin;
                    this.y = Math.random() * (h - margin * 2) + margin;
                    attempts++;
                    const distToBall = Math.hypot(this.x - ballPos.x, this.y - ballPos.y);
                    const distToGoal = Math.hypot(this.x - goalPos.x, this.y - goalPos.y);
                    if (distToBall >= safeDistBall && distToGoal >= safeDistGoal) break;
                } while (attempts < 100); 
            }
            update() {
                if (!this.isMoving) return;
                this.x += this.vx;
                this.y += this.vy;
                if (Math.abs(this.x - this.baseX) > this.range || this.x < 20 || this.x > window.innerWidth - 20) this.vx *= -1;
                if (Math.abs(this.y - this.baseY) > this.range || this.y < 20 || this.y > window.innerHeight - 20) this.vy *= -1;
            }
            draw(ctx) {
                ctx.fillStyle = CONFIG.COLORS.HOLE;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                if (this.isMoving) {
                    ctx.strokeStyle = "rgba(59, 130, 246, 0.4)";
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
        }

        const Game = {
            state: {
                active: false,
                gameOver: false,
                waiting: false,
                penaltyRemaining: 0,
                currentLevel: 1,
                levelScore: 0,
                totalScore: 0,
                starsEarned: 0,
                timeLeft: CONFIG.GAME_DURATION,
                tilt: { beta: 0, gamma: 0 }
            },
            dom: {},
            entities: {
                ball: new Ball(),
                holes: [],
                goal: { x: 0, y: 0 },
                powerup: null
            },
            lastTime: 0,
            
            init() {
                this.canvas = document.getElementById('game-canvas');
                this.ctx = this.canvas.getContext('2d');
                
                this.dom = {
                    score: document.getElementById('score-display'),
                    timer: document.getElementById('timer-display'),
                    timerCard: document.getElementById('timer-card'),
                    startScreen: document.getElementById('start-screen'),
                    gameOverScreen: document.getElementById('game-over-screen'),
                    finalScore: document.getElementById('final-score'),
                    penaltyLayer: document.getElementById('penalty-layer'),
                    penaltyTimer: document.getElementById('penalty-timer'),
                    bonusContainer: document.getElementById('bonus-container'),
                    levelDisplay: document.getElementById('level-display'),
                    levelCompleteScreen: document.getElementById('level-complete-screen'),
                    levelScoreDisplay: document.getElementById('level-score-display'),
                    starsDisplay: document.getElementById('stars-display')
                };

                this.loadProgress();
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                document.getElementById('start-btn').onclick = () => this.requestAuth();
                document.getElementById('restart-btn').onclick = () => this.reset();
                
                document.getElementById('replay-level-btn').onclick = () => {
                    this.dom.levelCompleteScreen.classList.add('hidden');
                    this.state.active = true;
                    this.startLevel(this.state.currentLevel);
                };
                
                document.getElementById('next-level-btn').onclick = () => {
                    const nextLevel = getNextLevel(this.state.currentLevel);
                    if (nextLevel) {
                        this.dom.levelCompleteScreen.classList.add('hidden');
                        this.state.active = true;
                        this.startLevel(nextLevel);
                    } else {
                        alert('Gratulálunk! Teljesítetted az összes szintet!');
                        this.state.currentLevel = 1;
                        this.saveProgress();
                        location.reload();
                    }
                };

                requestAnimationFrame(t => {
                    this.lastTime = t;
                    this.loop(t);
                });
            },

        // MÓDOSÍTOTT requestAuth: Itt hívjuk meg a Wake Lock-ot is!
            async requestAuth() {
                // 1. Kérjük a Wake Lock-ot (iOS Safari 16.4+ támogatja)
                await requestWakeLock();                
                try {
                    // 2. Mozgásérzékelő engedélyezése (marad az eredeti)
                    if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
                        const res = await DeviceOrientationEvent.requestPermission();
                        if (res !== 'granted') {
                            alert('A játékhoz mozgásérzékelő szükséges.');
                            return;
                        }
                    }
                    this.start();
                } catch (e) {
                    console.error("Auth error:", e);
                    this.start(); 
                }
            },

            // Figyeljük, ha a felhasználó visszatér a tabra, aktiváljuk újra
            handleVisibilityChange() {
                if (wakeLock !== null && document.visibilityState === 'visible') {
                    requestWakeLock();
                }
            },

            handleOrientation(e) {
                this.state.tilt.beta = e.beta || 0;
                this.state.tilt.gamma = e.gamma || 0;
            },

            reset() {
                this.state.totalScore = 0;
                this.state.currentLevel = 1;
                this.state.gameOver = false;
                this.state.waiting = false;
                this.dom.gameOverScreen.classList.add('hidden');
                this.startLevel(1);
            },

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            },

            generateLevel() {
                const w = this.canvas.width;
                const h = this.canvas.height;
                const levelData = LEVELS[this.state.currentLevel];
                
                this.entities.ball.reset();
                
                const minDistance = Math.min(w, h) * levelData.goalDistance;
                let goalAttempts = 0;
                do {
                    this.entities.goal.x = Math.random() * (w - 160) + 80;
                    this.entities.goal.y = Math.random() * (h - 160) + 80;
                    goalAttempts++;
                } while (Math.hypot(this.entities.goal.x - this.entities.ball.x, 
                                    this.entities.goal.y - this.entities.ball.y) < minDistance && goalAttempts < 50);

                this.entities.powerup = (Math.random() < levelData.powerupChance) ? {
                    x: Math.random() * (w - 160) + 80,
                    y: Math.random() * (h - 160) + 80,
                    active: true
                } : null;

                this.entities.holes = [];
                for(let i = 0; i < levelData.holes; i++) {
                    const hole = new Hole(w, h, this.entities.ball, this.entities.goal); 
                    if (levelData.holeSpeed > 0) {
                        hole.isMoving = true;
                        const angle = Math.random() * Math.PI * 2;
                        hole.vx = Math.cos(angle) * levelData.holeSpeed;
                        hole.vy = Math.sin(angle) * levelData.holeSpeed;
                        hole.range = 50 + Math.random() * 100;
                        hole.baseX = hole.x;
                        hole.baseY = hole.y;
                    }
                    this.entities.holes.push(hole);
                }
            },

            startLevel(levelNumber) {
                this.state.currentLevel = levelNumber;
                this.state.levelScore = 0;
                const levelData = LEVELS[levelNumber];
                this.state.timeLeft = levelData.timeLimit;
                
                this.dom.levelDisplay.innerText = levelNumber;
                this.dom.score.innerText = "0";
                this.dom.timerCard.classList.remove('bg-red-600/40');
                
                this.generateLevel();
                this.saveProgress();
            },

            start() {
                this.dom.startScreen.classList.add('opacity-0');
                setTimeout(() => this.dom.startScreen.classList.add('hidden'), 500);
                this.state.active = true;
                window.addEventListener('deviceorientation', this.handleOrientation.bind(this), true);
                this.startLevel(this.state.currentLevel);
            },

            completeLevel() {
                this.state.active = false;
                const levelData = LEVELS[this.state.currentLevel];
                const score = this.state.levelScore;
                
                let stars = 0;
                if (score >= levelData.starsThreshold[2]) stars = 3;
                else if (score >= levelData.starsThreshold[1]) stars = 2;
                else if (score >= levelData.starsThreshold[0]) stars = 1;
                
                this.state.totalScore += score;
                this.dom.levelScoreDisplay.innerText = score;
                this.showStars(stars);
                this.dom.levelCompleteScreen.classList.remove('hidden');
            },

            showStars(count) {
                const starElements = this.dom.starsDisplay.querySelectorAll('span');
                starElements.forEach((star, i) => {
                    star.classList.remove('opacity-100', 'scale-125');
                    star.classList.add('opacity-30');
                    if (i < count) {
                        setTimeout(() => {
                            star.classList.remove('opacity-30');
                            star.classList.add('opacity-100', 'scale-125');
                            setTimeout(() => star.classList.remove('scale-125'), 200);
                        }, i * 300);
                    }
                });
            },

            triggerPenalty() {
                if (this.state.waiting || !this.state.active) return;
                this.state.waiting = true;
                this.state.penaltyRemaining = 3;
                this.dom.penaltyLayer.classList.remove('hidden');
            },

            showBonusToast() {
                const toast = document.createElement('div');
                toast.className = 'glass px-4 py-1 rounded-full text-yellow-400 font-bold text-sm bonus-anim flex items-center shadow-lg border-yellow-500/30';
                toast.innerHTML = `<span class="mr-1">⚡</span> IDŐ BÓNUSZ +5s`;
                this.dom.bonusContainer.appendChild(toast);
                setTimeout(() => toast.remove(), 1600);
            },

            update(dt) {
                if (!this.state.active || this.state.gameOver) return;

                const dtSec = dt / 1000;
                this.state.timeLeft -= dtSec;

                if (this.state.timeLeft <= 0) {
                    this.state.timeLeft = 0;
                    this.completeLevel();
                    return;
                }

                this.dom.timer.innerText = this.state.timeLeft.toFixed(1) + 's';
                if (this.state.timeLeft < 10) this.dom.timerCard.classList.add('bg-red-600/40');

                if (this.state.waiting) {
                    this.state.penaltyRemaining -= dtSec;
                    this.dom.penaltyTimer.innerText = Math.ceil(this.state.penaltyRemaining);
                    if (this.state.penaltyRemaining <= 0) {
                        this.state.waiting = false;
                        this.dom.penaltyLayer.classList.add('hidden');
                        this.entities.ball.reset();
                    }
                    return;
                }

                this.entities.ball.update(this.state.tilt, this.state.currentLevel);
                this.entities.holes.forEach(h => h.update());

                const ball = this.entities.ball;
                const goal = this.entities.goal;
                if (Math.hypot(ball.x - goal.x, ball.y - goal.y) < CONFIG.ENTITIES.GOAL_RADIUS) {
                    this.state.levelScore++;
                    this.dom.score.innerText = this.state.levelScore;
                    this.generateLevel();
                }

                for (let h of this.entities.holes) {
                    if (Math.hypot(ball.x - h.x, ball.y - h.y) < CONFIG.ENTITIES.HOLE_RADIUS - 2) {
                        this.triggerPenalty();
                        break;
                    }
                }
                
                const p = this.entities.powerup;
                if (p && p.active && Math.hypot(ball.x - p.x, ball.y - p.y) < CONFIG.ENTITIES.POWERUP_RADIUS + 10) {
                    p.active = false;
                    this.state.timeLeft += 5;
                    this.showBonusToast();
                }
            },

            draw() {
                this.ctx.fillStyle = CONFIG.COLORS.BG;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                if (!this.state.active) return;

                this.ctx.fillStyle = CONFIG.COLORS.GOAL;
                this.ctx.beginPath();
                this.ctx.arc(this.entities.goal.x, this.entities.goal.y, CONFIG.ENTITIES.GOAL_RADIUS, 0, Math.PI * 2);
                this.ctx.fill();

                if (this.entities.powerup?.active) {
                    const p = this.entities.powerup;
                    this.ctx.save();
                    this.ctx.shadowBlur = 15;
                    this.ctx.shadowColor = CONFIG.COLORS.POWERUP;
                    this.ctx.fillStyle = CONFIG.COLORS.POWERUP;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, CONFIG.ENTITIES.POWERUP_RADIUS, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.fillStyle = '#000000';
                    this.ctx.font = 'bold 12px sans-serif';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('+5s', p.x, p.y + 4);
                    this.ctx.restore();
                }

                this.entities.holes.forEach(h => h.draw(this.ctx));
                this.entities.ball.draw(this.ctx, this.state.waiting);
            },

            loop(t) {
                const dt = t - this.lastTime;
                this.lastTime = t;
                this.update(Math.min(dt, 100));
                this.draw();
                requestAnimationFrame(time => this.loop(time));
            },

            saveProgress() {
                const progress = {
                    currentLevel: this.state.currentLevel,
                    totalScore: this.state.totalScore
                };
                localStorage.setItem('tiptop_progress', JSON.stringify(progress));
            },

            loadProgress() {
                const saved = localStorage.getItem('tiptop_progress');
                if (saved) {
                    const progress = JSON.parse(saved);
                    this.state.currentLevel = progress.currentLevel || 1;
                    this.state.totalScore = progress.totalScore || 0;
                }
            }
        };

        window.onload = () => Game.init();
    </script>
</body>
</html>
